name: Release Packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver release version, with or without leading v"
        required: true
        default: "v1.0.0"

permissions:
  actions: read
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Package (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: windows
            task: windows:package
          - os: ubuntu-24.04
            platform: linux
            task: linux:package
          - os: macos-14
            platform: darwin
            task: darwin:package
    env:
      CAIRN_ARTIFACT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
      RELEASE_INPUT_VERSION: ${{ inputs.version }}
      WINDOWS_SIGN_PFX_BASE64: ${{ secrets.WINDOWS_SIGN_PFX_BASE64 }}
      WINDOWS_SIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGN_PFX_PASSWORD }}
      MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
      MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
      MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Wails CLI
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin/wails3
            ~/go/bin/wails3.exe
          key: ${{ runner.os }}-wails3-v3.0.0-alpha2.103

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config gcc fakeroot file desktop-file-utils libfuse2 \
            libgtk-4-dev libwebkitgtk-6.0-dev libsoup-3.0-dev

      - name: Install Wails CLI
        shell: pwsh
        run: |
          $goBin = Join-Path (go env GOPATH) "bin"
          Add-Content -Path $env:GITHUB_PATH -Value $goBin
          $wailsExe = Join-Path $goBin ($(if ($IsWindows) { "wails3.exe" } else { "wails3" }))
          if (!(Test-Path -LiteralPath $wailsExe)) {
            go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.103
          }
          & $wailsExe version

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files (x86)\NSIS"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Stamp release version and assets
        shell: pwsh
        run: |
          $inputVersion = $env:RELEASE_INPUT_VERSION
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $inputVersion = $env:GITHUB_REF_NAME
          }
          $buildDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          ./scripts/sync-assets.ps1
          ./scripts/stamp-version.ps1 -Version $inputVersion -Commit $env:GITHUB_SHA -BuildDate $buildDate
          Get-Content .release-version.env | Add-Content -Path $env:GITHUB_ENV

      - name: Package
        shell: pwsh
        run: |
          $env:VITE_CAIRN_VERSION = $env:CAIRN_VERSION
          wails3 task ${{ matrix.task }} APP_VERSION=$env:CAIRN_VERSION GIT_COMMIT=$env:CAIRN_COMMIT BUILD_DATE=$env:CAIRN_BUILD_DATE INSTALL_SCOPE=user

      - name: Note unsigned Windows release
        if: startsWith(github.ref, 'refs/tags/v') && matrix.platform == 'windows' && (env.WINDOWS_SIGN_PFX_BASE64 == '' || env.WINDOWS_SIGN_PFX_PASSWORD == '')
        run: echo "Windows signing secrets are not configured. The NSIS installer will be published with an -unsigned suffix."

      - name: Sign Windows installer
        if: matrix.platform == 'windows' && env.WINDOWS_SIGN_PFX_BASE64 != '' && env.WINDOWS_SIGN_PFX_PASSWORD != ''
        shell: pwsh
        run: |
          $cert = Join-Path $env:RUNNER_TEMP "cairn-signing.pfx"
          [IO.File]::WriteAllBytes($cert, [Convert]::FromBase64String($env:WINDOWS_SIGN_PFX_BASE64))
          $installer = Get-ChildItem bin -Filter "cairn-*-installer.exe" | Select-Object -First 1
          if (!$installer) { throw "NSIS installer not found" }
          & signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f $cert /p $env:WINDOWS_SIGN_PFX_PASSWORD $installer.FullName

      - name: Mark unsigned Windows smoke artifact
        if: matrix.platform == 'windows' && (env.WINDOWS_SIGN_PFX_BASE64 == '' || env.WINDOWS_SIGN_PFX_PASSWORD == '')
        shell: pwsh
        run: |
          Get-ChildItem bin -Filter "cairn-*-installer.exe" | Rename-Item -NewName { $_.BaseName + "-unsigned" + $_.Extension }

      - name: Note unsigned macOS release
        if: startsWith(github.ref, 'refs/tags/v') && matrix.platform == 'darwin' && (env.MACOS_CERTIFICATE_BASE64 == '' || env.MACOS_SIGN_IDENTITY == '' || env.MACOS_NOTARY_KEY == '' || env.MACOS_NOTARY_KEY_ID == '' || env.MACOS_NOTARY_ISSUER_ID == '')
        run: echo "macOS signing/notary secrets are not configured. The DMG will be published with an -unsigned suffix."

      - name: Sign and notarize macOS dmg
        if: matrix.platform == 'darwin' && env.MACOS_CERTIFICATE_BASE64 != ''
        shell: pwsh
        run: |
          $keychainPassword = if ($env:MACOS_KEYCHAIN_PASSWORD) { $env:MACOS_KEYCHAIN_PASSWORD } else { [guid]::NewGuid().ToString("N") }
          $keychain = Join-Path $env:RUNNER_TEMP "cairn-signing.keychain-db"
          $cert = Join-Path $env:RUNNER_TEMP "cairn-signing.p12"
          [IO.File]::WriteAllBytes($cert, [Convert]::FromBase64String($env:MACOS_CERTIFICATE_BASE64))
          security create-keychain -p $keychainPassword $keychain
          security set-keychain-settings -lut 21600 $keychain
          security unlock-keychain -p $keychainPassword $keychain
          security import $cert -k $keychain -P $env:MACOS_CERTIFICATE_PASSWORD -T /usr/bin/codesign
          security list-keychains -d user -s $keychain
          security default-keychain -s $keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k $keychainPassword $keychain

          codesign --force --deep --options runtime --timestamp --entitlements build/darwin/entitlements.plist --sign $env:MACOS_SIGN_IDENTITY bin/cairn.app
          Remove-Item bin/*.dmg -Force
          hdiutil create -volname cairn -srcfolder bin/cairn.app -ov -format UDZO "bin/cairn-$env:CAIRN_VERSION.dmg"
          codesign --force --timestamp --sign $env:MACOS_SIGN_IDENTITY "bin/cairn-$env:CAIRN_VERSION.dmg"

          $notaryKey = Join-Path $env:RUNNER_TEMP "AuthKey_$($env:MACOS_NOTARY_KEY_ID).p8"
          Set-Content -Path $notaryKey -Value $env:MACOS_NOTARY_KEY
          xcrun notarytool submit "bin/cairn-$env:CAIRN_VERSION.dmg" --key $notaryKey --key-id $env:MACOS_NOTARY_KEY_ID --issuer $env:MACOS_NOTARY_ISSUER_ID --wait
          xcrun stapler staple "bin/cairn-$env:CAIRN_VERSION.dmg"

      - name: Mark unsigned macOS smoke artifact
        if: matrix.platform == 'darwin' && env.MACOS_CERTIFICATE_BASE64 == ''
        shell: pwsh
        run: |
          Get-ChildItem bin -Filter "*.dmg" | Rename-Item -NewName { $_.BaseName + "-unsigned" + $_.Extension }

      - name: Check release artifacts
        shell: pwsh
        run: ./scripts/check-release-artifacts.ps1 -Platform ${{ matrix.platform }}

      - name: Generate package SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          path: bin
          format: spdx-json
          artifact-name: cairn-${{ matrix.platform }}-${{ env.CAIRN_ARTIFACT_REF }}.spdx.json

      - name: Upgrade fixture smoke
        shell: pwsh
        run: ./scripts/run-release-validation.ps1 -Suite upgrade-fixtures

      - name: Linux deb install/uninstall smoke
        if: runner.os == 'Linux'
        shell: pwsh
        run: ./scripts/test-linux-deb-install.ps1

      - name: Debian stable container deb install/uninstall smoke
        if: runner.os == 'Linux'
        shell: pwsh
        run: ./scripts/run-release-validation.ps1 -Suite debian-deb-container

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cairn-${{ matrix.platform }}-${{ env.CAIRN_ARTIFACT_REF }}
          if-no-files-found: error
          path: |
            bin/*.exe
            bin/*.AppImage
            bin/*.deb
            bin/*.dmg

  publish-release:
    name: Publish GitHub Release
    needs: package
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: cairn-*-${{ github.ref_name }}*
          merge-multiple: true

      - name: List release artifacts
        run: find release-artifacts -maxdepth 1 -type f -print | sort

      - name: Remove existing release before rerun
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --yes || true

      - name: Publish GitHub Release
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GODEBUG: http2client=0
