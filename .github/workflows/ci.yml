name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

jobs:
  lint-test:
    name: Lint and unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-latest, macos-14]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache: true

      - name: Assert pinned Go version
        shell: bash
        run: test "$(go version | awk '{print $3}')" = "go1.26.4"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config gcc \
            libgtk-4-dev libwebkitgtk-6.0-dev libsoup-3.0-dev \
            docker.io docker-buildx docker-compose-v2
          sudo systemctl start docker.service || sudo service docker start
          sudo chmod 666 /var/run/docker.sock
          timeout 60 bash -c 'until docker info >/dev/null 2>&1; do sleep 2; done'
          docker version
          docker compose version
          docker buildx version

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend dependency audit
        working-directory: frontend
        run: npm run audit

      - name: Generate Wails bindings
        run: go run github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.99 generate bindings -clean=true -ts

      - name: Verify generated bindings are committed
        shell: bash
        run: git diff --exit-code -- frontend/bindings

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend unit tests
        working-directory: frontend
        run: npm test

      - name: Component catalog build
        working-directory: frontend
        run: npm run ladle:build

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Go unit tests
        run: go test . ./internal/...

      - name: Docker reconnect integration
        if: runner.os == 'Linux'
        env:
          CAIRN_REAL_DOCKER_RESTART: "1"
        run: go test ./internal/docker -run TestClientRealDockerRestartIntegration -count=1 -timeout=2m

      - name: Log streaming integration
        if: runner.os == 'Linux'
        env:
          CAIRN_REAL_DOCKER_LOGS: "1"
        run: go test ./internal/logsvc -run TestManagerRealDockerBigLogsIntegration -count=1 -timeout=3m

      - name: Metrics integration
        if: runner.os == 'Linux'
        env:
          CAIRN_REAL_DOCKER_METRICS: "1"
        run: go test ./internal/metrics -run TestManagerRealDockerStatsIntegration -count=1 -timeout=3m

      - name: Terminal integration
        if: runner.os == 'Linux'
        env:
          CAIRN_REAL_DOCKER_TERMINAL: "1"
        run: go test ./internal/terminal -run TestManagerRealDockerContainerTerminalIntegration -count=1 -timeout=3m

      - name: Backup integration
        if: runner.os == 'Linux'
        env:
          CAIRN_REAL_DOCKER_BACKUPS: "1"
        run: go test ./internal/backups -run TestManagerRealDockerBackupRestoreRoundTrip -count=1 -timeout=3m

      - name: Registry auth integration
        if: runner.os == 'Linux'
        env:
          CAIRN_REAL_DOCKER_REGISTRY: "1"
        run: go test ./internal/registry -run TestManagerRealDockerRegistryAuthRoundTrip -count=1 -timeout=4m

      - name: Registry tag push integration
        if: runner.os == 'Linux'
        env:
          CAIRN_REAL_DOCKER_REGISTRY: "1"
        run: go test ./internal/docker -run TestClientRealRegistryTagPushRoundTrip -count=1 -timeout=4m

      - name: Go vet
        run: go vet . ./internal/...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m
