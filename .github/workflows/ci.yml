name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint and unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022, macos-14]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache: true

      - name: Assert pinned Go version
        shell: bash
        run: test "$(go version | awk '{print $3}')" = "go1.26.4"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config gcc \
            libgtk-4-dev libwebkitgtk-6.0-dev libsoup-3.0-dev
          if ! sudo docker info >/dev/null 2>&1; then
            sudo systemctl start docker.service || sudo service docker start || (sudo dockerd > /tmp/cairn-dockerd.log 2>&1 &)
          fi
          timeout 60 bash -c 'until sudo docker info >/dev/null 2>&1; do sleep 2; done'
          sudo chmod 666 /var/run/docker.sock
          docker info
          docker version
          docker compose version
          docker buildx version

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend dependency audit
        working-directory: frontend
        run: npm run audit

      - name: Generate Wails bindings
        run: go run github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.103 generate bindings -clean=true -ts

      - name: Verify generated bindings are committed
        shell: bash
        run: git diff --exit-code -- frontend/bindings

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend format check
        working-directory: frontend
        run: npm run format:check

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Frontend unit tests
        working-directory: frontend
        run: npm test

      - name: Component catalog build
        working-directory: frontend
        run: npm run ladle:build

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Go unit tests
        run: go test . ./internal/...

      - name: Go vulnerability scan
        shell: pwsh
        run: ./scripts/run-govulncheck.ps1

      - name: GoReleaser config check
        if: runner.os == 'Linux'
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

      - name: Docker reconnect integration
        if: runner.os == 'Linux'
        env:
          CAIRN_REAL_DOCKER_RESTART: "1"
        run: go test ./internal/docker -run TestClientRealDockerRestartIntegration -count=1 -timeout=2m

      - name: Log streaming integration
        if: runner.os == 'Linux'
        env:
          CAIRN_REAL_DOCKER_LOGS: "1"
        run: go test ./internal/logsvc -run TestManagerRealDockerBigLogsIntegration -count=1 -timeout=3m

      - name: Metrics integration
        if: runner.os == 'Linux'
        env:
          CAIRN_REAL_DOCKER_METRICS: "1"
        run: go test ./internal/metrics -run TestManagerRealDockerStatsIntegration -count=1 -timeout=3m

      - name: Terminal integration
        if: runner.os == 'Linux'
        env:
          CAIRN_REAL_DOCKER_TERMINAL: "1"
        run: go test ./internal/terminal -run TestManagerRealDockerContainerTerminalIntegration -count=1 -timeout=3m

      - name: Backup integration
        if: runner.os == 'Linux'
        env:
          CAIRN_REAL_DOCKER_BACKUPS: "1"
        run: go test ./internal/backups -run TestManagerRealDockerBackupRestoreRoundTrip -count=1 -timeout=3m

      - name: Registry auth integration
        if: runner.os == 'Linux'
        env:
          CAIRN_REAL_DOCKER_REGISTRY: "1"
        run: go test ./internal/registry -run TestManagerRealDockerRegistryAuthRoundTrip -count=1 -timeout=4m

      - name: Registry tag push integration
        if: runner.os == 'Linux'
        env:
          CAIRN_REAL_DOCKER_REGISTRY: "1"
        run: go test ./internal/docker -run TestClientRealRegistryTagPushRoundTrip -count=1 -timeout=4m

      - name: Go vet
        run: go vet -unsafeptr=false . ./internal/...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.6.2
          args: --timeout=5m

  package-smoke:
    name: Package smoke (${{ matrix.os }})
    needs: lint-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            task: linux:package
          - os: windows-2022
            platform: windows
            task: windows:package
          - os: macos-14
            platform: darwin
            task: darwin:package
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Wails CLI
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin/wails3
            ~/go/bin/wails3.exe
          key: ${{ runner.os }}-wails3-v3.0.0-alpha2.103

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config gcc fakeroot file desktop-file-utils libfuse2 \
            libgtk-4-dev libwebkitgtk-6.0-dev libsoup-3.0-dev

      - name: Install Wails CLI
        shell: pwsh
        run: |
          $goBin = Join-Path (go env GOPATH) "bin"
          Add-Content -Path $env:GITHUB_PATH -Value $goBin
          $wailsExe = Join-Path $goBin ($(if ($IsWindows) { "wails3.exe" } else { "wails3" }))
          if (!(Test-Path -LiteralPath $wailsExe)) {
            go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.103
          }
          & $wailsExe version

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files (x86)\NSIS"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browser
        if: runner.os == 'Linux'
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Stamp smoke version and assets
        shell: pwsh
        run: |
          $buildDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          ./scripts/sync-assets.ps1
          ./scripts/stamp-version.ps1 -Version "1.0.0" -Commit $env:GITHUB_SHA -BuildDate $buildDate
          Get-Content .release-version.env | Add-Content -Path $env:GITHUB_ENV

      - name: Package smoke
        shell: pwsh
        run: |
          $env:VITE_CAIRN_VERSION = $env:CAIRN_VERSION
          wails3 task ${{ matrix.task }} APP_VERSION=$env:CAIRN_VERSION GIT_COMMIT=$env:CAIRN_COMMIT BUILD_DATE=$env:CAIRN_BUILD_DATE INSTALL_SCOPE=user

      - name: Check package artifacts
        shell: pwsh
        run: ./scripts/check-release-artifacts.ps1 -Platform ${{ matrix.platform }}

      - name: Linux deb install/uninstall smoke
        if: runner.os == 'Linux'
        shell: pwsh
        run: ./scripts/test-linux-deb-install.ps1

      - name: Debian stable container deb install/uninstall smoke
        if: runner.os == 'Linux'
        shell: pwsh
        run: ./scripts/run-release-validation.ps1 -Suite debian-deb-container

      - name: Release validation smoke
        if: runner.os == 'Linux'
        shell: pwsh
        run: ./scripts/run-release-validation.ps1 -Suite checklist,manual-matrix,soak-checker,upgrade-fixtures,security,performance,soak-smoke,ui-release -SoakDuration 30s -SoakTimeout 5m
