# Feel free to remove those if you don't want/need to use them.
# Make sure to check the documentation at https://nfpm.goreleaser.com
#
# The lines below are called `modelines`. See `:help modeline`

name: "cairn"
arch: ${GOARCH}
platform: "linux"
version: "0.1.0"
section: "utils"
priority: "optional"
maintainer: Cairn Maintainers <noreply@github.com>
description: "A clean Compose-first Docker manager for Windows, macOS, and Linux"
vendor: "Cairn"
homepage: "https://github.com/RCooLeR/Cairn"
license: "Proprietary"
release: "1"

contents:
  - src: "./bin/cairn"
    dst: "/usr/bin/cairn"
  - src: "./build/linux/icons/hicolor/16x16/apps/cairn.png"
    dst: "/usr/share/icons/hicolor/16x16/apps/cairn.png"
  - src: "./build/linux/icons/hicolor/24x24/apps/cairn.png"
    dst: "/usr/share/icons/hicolor/24x24/apps/cairn.png"
  - src: "./build/linux/icons/hicolor/32x32/apps/cairn.png"
    dst: "/usr/share/icons/hicolor/32x32/apps/cairn.png"
  - src: "./build/linux/icons/hicolor/48x48/apps/cairn.png"
    dst: "/usr/share/icons/hicolor/48x48/apps/cairn.png"
  - src: "./build/linux/icons/hicolor/64x64/apps/cairn.png"
    dst: "/usr/share/icons/hicolor/64x64/apps/cairn.png"
  - src: "./build/linux/icons/hicolor/128x128/apps/cairn.png"
    dst: "/usr/share/icons/hicolor/128x128/apps/cairn.png"
  - src: "./build/linux/icons/hicolor/256x256/apps/cairn.png"
    dst: "/usr/share/icons/hicolor/256x256/apps/cairn.png"
  - src: "./build/linux/icons/hicolor/512x512/apps/cairn.png"
    dst: "/usr/share/icons/hicolor/512x512/apps/cairn.png"
  - src: "./build/linux/cairn.desktop"
    dst: "/usr/share/applications/cairn.desktop"

# Default dependencies for the GTK4 + WebKitGTK 6.0 stack (Ubuntu 24.04+ / Debian 13+)
depends:
  - libgtk-4-1
  - libwebkitgtk-6.0-4

# Distribution-specific overrides for different package formats
overrides:
  # RPM packages for Fedora / RHEL / AlmaLinux / Rocky Linux
  rpm:
    depends:
      - gtk4
      - webkitgtk6.0

  # Arch Linux packages
  archlinux:
    depends:
      - gtk4
      - webkitgtk-6.0

# scripts section to ensure desktop database is updated after install
scripts:
  postinstall: "./build/linux/nfpm/scripts/postinstall.sh"
  postremove: "./build/linux/nfpm/scripts/postremove.sh"

# If you build your app with -tags gtk3 (legacy WebKit2GTK 4.1 stack — supported through v3.0.x, removed in v3.1),
# replace the depends/overrides above with these:
#
# depends:
#   - libgtk-3-0
#   - libwebkit2gtk-4.1-0
# overrides:
#   rpm:
#     depends:
#       - gtk3
#       - webkit2gtk4.1
#   archlinux:
#     depends:
#       - gtk3
#       - webkit2gtk-4.1
#
# replaces:
#   - foobar
# provides:
#   - bar
# recommends:
#   - whatever
# suggests:
#   - something-else
# conflicts:
#   - not-foo
#   - not-bar
# changelog: "changelog.yaml"
