version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unused
  settings:
    govet:
      disable:
        - unsafeptr
  exclusions:
    generated: lax
    paths:
      - ^frontend/node_modules/
      - ^frontend/dist/
      - ^bin/
      - ^build/

run:
  timeout: 5m
  tests: true
