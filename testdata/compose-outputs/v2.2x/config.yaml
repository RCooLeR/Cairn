name: app-db
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: example
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres
    volumes:
      - db-data:/var/lib/postgresql/data
  web:
    image: nginx:alpine
    build:
      context: ./web
      dockerfile: Dockerfile
      target: runtime
      args:
        NODE_VERSION: "22"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./web.env
    ports:
      - mode=ingress,target=80,published=18080,protocol=tcp
    profiles:
      - default
volumes:
  db-data: {}
